<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat x Inequality Explorer | Treejectory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1a1a1a;line-height:1.6;background:#fff}.container{max-width:800px;margin:0 auto;padding:1.5rem}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}.metric{background:#f5f5f5;border-radius:8px;padding:1rem}.metric .label{font-size:13px;color:#888}.metric .value{font-size:20px;font-weight:600}.metric .value.red{color:#c85a5a}.controls{display:flex;gap:12px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}.controls label{font-size:14px;color:#666}.controls select{padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:6px}.controls button{font-size:13px;padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer}.controls button.active{font-weight:600;background:#f0f0f0}.chart-wrap{position:relative;width:100%;height:380px;margin-bottom:1rem}.legend{display:flex;gap:16px;font-size:12px;color:#888;margin-bottom:12px}.legend span{display:flex;align-items:center;gap:4px}.legend .dot{width:10px;height:10px;border-radius:2px}.info{background:#f5f5f5;border-radius:8px;padding:1rem;font-size:14px;line-height:1.6}.info strong{font-weight:600}.info .sources{font-size:12px;color:#aaa;margin-top:8px}
</style>
</head>
<body>
<div class="container">
<div class="metrics">
  <div class="metric"><div class="label">City</div><div class="value" id="m-city">Lyon</div></div>
  <div class="metric"><div class="label">Income vs heat</div><div class="value red" id="m-rho">—</div></div>
  <div class="metric"><div class="label">Canopy vs heat</div><div class="value red" id="m-rho2">—</div></div>
  <div class="metric"><div class="label">Grid cells</div><div class="value" id="m-cells">—</div></div>
</div>
<div class="controls">
  <label>City</label>
  <select id="city-sel"></select>
  <label style="margin-left:12px">Colour by</label>
  <button id="btn-canopy" class="active">Canopy %</button>
  <button id="btn-income">Income proxy</button>
</div>
<div class="chart-wrap"><canvas id="scatterChart"></canvas></div>
<div class="legend">
  <span><span class="dot" style="background:#c85a5a"></span>Low (hot / deprived / low canopy)</span>
  <span><span class="dot" style="background:#e8e8a0"></span>Mid</span>
  <span><span class="dot" style="background:#1D9E75"></span>High (cool / wealthy / high canopy)</span>
</div>
<div class="info">
  <strong id="info-headline"></strong>
  <div class="sources" id="info-sources"></div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

      {x:45,y:33.0,c:42},{x:50,y:32.5,c:46},{x:7,y:36.8,c:12},{x:12,y:36.2,c:16},
      {x:18,y:35.8,c:20},{x:22,y:35.2,c:24},{x:28,y:34.8,c:28},{x:33,y:34.2,c:32},

const cityIds = Object.keys(cityData);
const sel = document.getElementById("city-sel");
cityIds.forEach(id => {
  const o = document.createElement("option");
  o.value = id; o.textContent = cityData[id].name + " (" + cityData[id].country + ")";
  sel.appendChild(o);
});

let currentCity = "lyon";
let colorField = "can";

function getColor(val, min, max) {
  const t = Math.max(0, Math.min(1, (val - min) / (max - min)));
  return `rgb(${Math.round(200 - t * 171)},${Math.round(90 + t * 68)},${Math.round(90 - t * 17)})`;
}

const ctx = document.getElementById("scatterChart");
const chart = new Chart(ctx, {
  type: "scatter",
  data: { datasets: [{ data: [], pointRadius: 5, pointHoverRadius: 7, pointBorderColor: "rgba(0,0,0,0.15)", pointBorderWidth: 0.5 }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false },
      tooltip: { callbacks: { label: function(ctx) {
        const cd = cityData[currentCity];
        const p = cd.points[ctx.dataIndex];
        return cd.xlabel.split("(")[0].trim() + ": " + Math.round(p.x).toLocaleString() + " | " + p.y.toFixed(1) + "°C | " + p.c + "% canopy";
      }}}
    },
    scales: {
      x: { title: { display: true, text: "", font: { size: 12 } } },
      y: { title: { display: true, text: "Surface temperature (°C)", font: { size: 12 } } }
    }
  }
});

function loadCity(id) {
  currentCity = id;
  const cd = cityData[id];
  document.getElementById("m-city").textContent = cd.name;
  document.getElementById("m-cells").textContent = cd.cells.toLocaleString();

  // For UK IMD, higher rank = less deprived, so correlation is positive
  // Display absolute value with direction note
  const rhoInc = cd.rho_inc;
  document.getElementById("m-rho").textContent = "ρ = " + (rhoInc > 0 ? "+" : "") + rhoInc.toFixed(2);
  document.getElementById("m-rho2").textContent = "ρ = " + cd.rho_can.toFixed(2);

  chart.data.datasets[0].data = cd.points.map(p => ({ x: p.x, y: p.y }));
  chart.options.scales.x.title.text = cd.xlabel;
  recolor();

  const direction = rhoInc < 0 ? "lower income areas are hotter" : "more deprived areas are hotter";
  document.getElementById("info-headline").textContent =
    cd.name + ": " + direction + " (ρ = " + rhoInc.toFixed(2) + "). Less canopy = hotter (ρ = " + cd.rho_can.toFixed(2) + ").";
  document.getElementById("info-sources").textContent =
    "Source: " + cd.source + ", Landsat 9 LST, Meta/WRI canopy (2020). Unpublished analysis by Dr Thami Croeser, June 2026.";
}

function recolor() {
  const cd = cityData[currentCity];
  const field = colorField;
  let colors;
  if (field === "can") {
    const vals = cd.points.map(p => p.c);
    colors = vals.map(v => getColor(v, 0, Math.max(...vals)));
  } else {
    const vals = cd.points.map(p => p.x);
    colors = vals.map(v => getColor(v, Math.min(...vals), Math.max(...vals)));
  }
  chart.data.datasets[0].pointBackgroundColor = colors;
  chart.update("none");
}

sel.addEventListener("change", () => loadCity(sel.value));
document.getElementById("btn-canopy").addEventListener("click", () => {
  colorField = "can"; recolor();
  document.getElementById("btn-canopy").classList.add("active");
  document.getElementById("btn-income").classList.remove("active");
});
document.getElementById("btn-income").addEventListener("click", () => {
  colorField = "inc"; recolor();
  document.getElementById("btn-income").classList.add("active");
  document.getElementById("btn-canopy").classList.remove("active");
});

loadCity("lyon");
</script>
</body>
</html>
